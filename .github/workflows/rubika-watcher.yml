name: Rubika – Spear Folder Watcher (continuous)

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (starts a fresh runner)
  workflow_dispatch:

jobs:
  watch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # max 6 hours per run (GitHub limit)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Watch spear folder and send files to Rubika
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_CHAT_ID: ${{ secrets.RUBIKA_CHAT_ID }}
        run: python -u send_spear_folder.py
